# Netlify configuration file for Vite React application

[build]
  # Directory with the source code
  base = "/"
  
  # Build command - this compiles your React app
  command = "npm run build"
  
  # Directory where the built files are located (Vite default output)
  publish = "dist"

# Redirect rules for Single Page Application (SPA)
# This ensures all routes work properly (not just the homepage)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Set Node version (recommended for consistency)
[build.environment]
  NODE_VERSION = "18"

# Optional: Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Cache control for static assets
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Don't cache the HTML file
    Cache-Control = "public, max-age=0, must-revalidate"

# Optional: Custom 404 page (if you create one)
# [[redirects]]
#   from = "/404"
#   to = "/404.html"
#   status = 404
